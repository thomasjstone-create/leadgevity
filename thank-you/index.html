<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Leadgevity</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Archivo', sans-serif; background-color: #ffffff; color: #000000; }
    .teal-brand { color: #0d7377; }
    .bg-teal-brand { background-color: #0d7377; }
    .border-teal-brand { border-color: #0d7377; }
  </style>
</head>
<body>
  <div class="min-h-screen">
    <nav class="max-w-6xl mx-auto px-6 py-6 border-b border-gray-100 flex justify-between items-center">
      <div class="text-xl font-bold tracking-tight">Leadgevity</div>
      <div class="hidden md:flex items-center space-x-6">
        <a href="index.html#platforms" class="text-xs font-medium uppercase tracking-wider hover:text-[#0d7377] transition-colors">Channels</a>
        <a href="index.html#services" class="text-xs font-medium uppercase tracking-wider hover:text-[#0d7377] transition-colors">What we do</a>
        <a href="index.html#contact" class="px-4 py-2 bg-teal-brand text-white text-xs font-medium uppercase tracking-wider hover:bg-black transition-all">Contact</a>
      </div>
    </nav>
    <main class="max-w-4xl mx-auto px-6 py-20 text-center">
      <h1 class="text-4xl md:text-5xl font-bold mb-6 tracking-tight">Thank you for getting in touch.</h1>
      <div class="mb-8">
        <img src="assets/thank-you.gif" alt="Thank you" class="mx-auto max-w-full h-auto rounded-lg shadow-md">
      </div>
      <p class="text-lg text-gray-600 mb-8 max-w-xl mx-auto">Your message has been sent successfully. I’ll review it and get back to you soon.</p>
      <div class="flex flex-col items-center gap-4 md:flex-row md:justify-center">
        <a href="index.html" class="px-10 py-4 bg-teal-brand text-white font-bold text-sm uppercase tracking-widest hover:bg-black transition-all">Back to home</a>
        <a href="index.html#contact" class="px-10 py-4 border border-gray-200 text-sm uppercase tracking-widest hover:border-black transition-all">Send another message</a>
      </div>
    </main>
    <footer class="py-10 border-t border-gray-100 text-center">
      <div class="max-w-6xl mx-auto px-6">
        <p class="text-[10px] uppercase tracking-widest text-gray-400">&copy; 2024 Leadgevity &middot; UK-based &middot; 10+ years experience &middot; Long-term growth</p>
      </div>
    </footer>
  </div>
</body>
</html>
